services:
  - type: web
    name: skillocraft-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONT_END_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DO_ACCESS_KEY
        sync: false
      - key: DO_SECRET_KEY
        sync: false
      - key: DO_BUCKET
        sync: false
      - key: DO_REGION
        sync: false
      - key: DO_SPACES_ENDPOINT
        sync: false
      - key: DO_BUCKET_URL
        sync: false
